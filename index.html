<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на курсы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .tab-user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .tab-admin {
            background: #f0f0f0;
            color: #333;
        }
        
        .tab.active {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .time-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .time-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .time-btn:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .time-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .time-btn.full {
            background: #ffe0e0;
            border-color: #ff4444;
            color: #cc0000;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: #4CAF50;
            color: white;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .btn-reset {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s;
        }
        
        .notification.show { display: block; }
        .notification.success { background: #4CAF50; }
        .notification.error { background: #f44336; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        #adminPanel {
            display: none;
        }
        
        .booking-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .booking-card.cancelled {
            border-left-color: #f44336;
            opacity: 0.6;
        }
        
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        
        .booking-name {
            font-weight: bold;
            font-size: 16px;
        }
        
        .booking-status {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
        }
        
        .status-active { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .btn-edit { background: #ff9800; color: white; }
        .btn-cancel { background: #f44336; color: white; }
        .btn-delete { background: #999; color: white; }
        
        .login-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Система записи</h1>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab tab-user active" onclick="showUserPanel()">📝 Записаться</button>
            <button class="tab tab-admin" onclick="showAdminLogin()">🔐 Админ</button>
        </div>
        
        <!-- Форма записи -->
        <div id="userPanel">
            <form id="bookingForm" onsubmit="return false;">
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="fullName" placeholder="Иванов Иван Иванович" required>
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="example@mail.ru" required>
                </div>
                
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="phone" placeholder="+7 (999) 123-45-67">
                </div>
                
                <div class="form-group">
                    <label>Дата курса *</label>
                    <input type="date" id="courseDate" required onchange="updateTimeSlots()">
                </div>
                
                <div class="form-group">
                    <label>Выберите время *</label>
                    <div id="timeSlots" class="time-grid">
                        <p style="grid-column: 1/-1; color: #999;">Сначала выберите дату</p>
                    </div>
                    <input type="hidden" id="selectedTime" required>
                </div>
                
                <button type="submit" class="btn btn-submit" onclick="submitBooking()">
                    ✅ Записаться на курс
                </button>
                <button type="button" class="btn btn-reset" onclick="resetForm()">
                    🔄 Очистить
                </button>
            </form>
            
            <div id="successMessage" class="hidden" style="text-align: center; padding: 30px;">
                <h3>✅ Спасибо за запись!</h3>
                <p>Вы успешно записаны на курс.</p>
                <button class="btn btn-submit" onclick="resetAfterSuccess()" style="margin-top: 20px;">
                    Записаться ещё раз
                </button>
            </div>
        </div>
        
        <!-- Панель админа -->
        <div id="adminLogin" class="hidden">
            <div class="login-box">
                <h3 style="margin-bottom: 15px;">🔐 Вход</h3>
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="loginInput" placeholder="admin">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="passwordInput" placeholder="admin123">
                </div>
                <button class="btn btn-submit" onclick="login()">Войти</button>
                <p style="text-align: center; margin-top: 10px; color: #999; font-size: 12px;">
                    Логин: admin / Пароль: admin123
                </p>
            </div>
            <button class="btn btn-reset" onclick="showUserPanel()">← Назад</button>
        </div>
        
        <!-- Список записей -->
        <div id="adminPanel" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>📋 Все записи (<span id="bookingCount">0</span>)</h3>
                <button class="btn-small btn-delete" onclick="logout()">Выйти</button>
            </div>
            
            <div class="form-group">
                <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="renderBookings()">
            </div>
            
            <div id="bookingsList"></div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>

    <script>
        // ============ ДАННЫЕ ============
        const TIME_SLOTS = ['09:00', '10:00', '11:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];
        const MAX_PER_SLOT = 5;
        
        // Загружаем записи из localStorage
        let bookings = JSON.parse(localStorage.getItem('courseBookings') || '[]');
        
        // ============ ИНИЦИАЛИЗАЦИЯ ============
        window.addEventListener('DOMContentLoaded', function() {
            setMinDate();
            console.log('Система готова. Записей:', bookings.length);
        });
        
        function setMinDate() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const minDate = tomorrow.toISOString().split('T')[0];
            document.getElementById('courseDate').min = minDate;
        }
        
        // ============ НАВИГАЦИЯ ============
        function showUserPanel() {
            document.getElementById('userPanel').classList.remove('hidden');
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.querySelector('.tab-user').classList.add('active');
            document.querySelector('.tab-admin').classList.remove('active');
        }
        
        function showAdminLogin() {
            document.getElementById('userPanel').classList.add('hidden');
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.querySelector('.tab-user').classList.remove('active');
            document.querySelector('.tab-admin').classList.add('active');
        }
        
        function showAdminPanel() {
            document.getElementById('userPanel').classList.add('hidden');
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            renderBookings();
        }
        
        function login() {
            const login = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            if (login === 'admin' && password === 'admin123') {
                showAdminPanel();
                showNotification('✅ Вход выполнен', 'success');
            } else {
                showNotification('❌ Неверный логин или пароль', 'error');
            }
        }
        
        function logout() {
            showUserPanel();
            showNotification('👋 Вы вышли', 'info');
        }
        
        // ============ ВРЕМЕННЫЕ СЛОТЫ ============
        function updateTimeSlots() {
            const date = document.getElementById('courseDate').value;
            const container = document.getElementById('timeSlots');
            
            if (!date) {
                container.innerHTML = '<p style="grid-column: 1/-1; color: #999;">Сначала выберите дату</p>';
                return;
            }
            
            container.innerHTML = '';
            
            TIME_SLOTS.forEach(time => {
                const booked = bookings.filter(b => b.date === date && b.time === time && b.status === 'active').length;
                const available = MAX_PER_SLOT - booked;
                const isFull = available <= 0;
                
                const btn = document.createElement('div');
                btn.className = 'time-btn';
                btn.textContent = `${time} (${available} мест)`;
                
                if (isFull) {
                    btn.classList.add('full');
                    btn.textContent = `${time} (нет мест)`;
                }
                
                btn.onclick = function() {
                    if (!isFull) {
                        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        document.getElementById('selectedTime').value = time;
                    }
                };
                
                container.appendChild(btn);
            });
        }
        
        // ============ ОТПРАВКА ФОРМЫ ============
        function submitBooking() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const date = document.getElementById('courseDate').value;
            const time = document.getElementById('selectedTime').value;
            
            // Проверки
            if (!fullName || !email || !date || !time) {
                showNotification('❌ Заполните все обязательные поля', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showNotification('❌ Неверный email', 'error');
                return;
            }
            
            // Проверка мест
            const booked = bookings.filter(b => b.date === date && b.time === time && b.status === 'active').length;
            if (booked >= MAX_PER_SLOT) {
                showNotification('❌ На это время нет мест', 'error');
                return;
            }
            
            // Создаем запись
            const booking = {
                id: Date.now(),
                fullName: fullName,
                email: email,
                phone: phone,
                date: date,
                time: time,
                status: 'active',
                createdAt: new Date().toISOString()
            };
            
            // Сохраняем
            bookings.push(booking);
            localStorage.setItem('courseBookings', JSON.stringify(bookings));
            
            // Показываем успех
            document.getElementById('bookingForm').style.display = 'none';
            document.getElementById('successMessage').classList.remove('hidden');
            
            showNotification('✅ Вы успешно записаны!', 'success');
            console.log('Новая запись:', booking);
            console.log('Всего записей:', bookings.length);
        }
        
        function resetForm() {
            document.getElementById('bookingForm').reset();
            document.getElementById('selectedTime').value = '';
            updateTimeSlots();
        }
        
        function resetAfterSuccess() {
            document.getElementById('bookingForm').style.display = 'block';
            document.getElementById('successMessage').classList.add('hidden');
            resetForm();
        }
        
        // ============ АДМИН-ПАНЕЛЬ ============
        function renderBookings() {
            const container = document.getElementById('bookingsList');
            const searchText = (document.getElementById('searchInput')?.value || '').toLowerCase();
            
            let filtered = [...bookings];
            
            if (searchText) {
                filtered = filtered.filter(b => 
                    b.fullName.toLowerCase().includes(searchText) ||
                    b.email.toLowerCase().includes(searchText) ||
                    (b.phone || '').includes(searchText)
                );
            }
            
            // Сортируем: новые сверху
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            document.getElementById('bookingCount').textContent = filtered.length;
            
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Нет записей</p>';
                return;
            }
            
            container.innerHTML = filtered.map(b => `
                <div class="booking-card ${b.status === 'cancelled' ? 'cancelled' : ''}">
                    <div class="booking-header">
                        <span class="booking-name">${b.fullName}</span>
                        <span class="booking-status ${b.status === 'active' ? 'status-active' : 'status-cancelled'}">
                            ${b.status === 'active' ? 'Активна' : 'Отменена'}
                        </span>
                    </div>
                    <div style="font-size: 14px; color: #666;">
                        📧 ${b.email}<br>
                        📞 ${b.phone || 'Не указан'}<br>
                        📅 ${new Date(b.date).toLocaleDateString('ru-RU')} в ${b.time}
                    </div>
                    <div style="margin-top: 10px;">
                        ${b.status === 'active' ? `
                            <button class="btn-small btn-cancel" onclick="cancelBooking(${b.id})">Отменить</button>
                        ` : `
                            <button class="btn-small btn-edit" onclick="restoreBooking(${b.id})">Восстановить</button>
                        `}
                        <button class="btn-small btn-delete" onclick="deleteBooking(${b.id})">Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        
        function cancelBooking(id) {
            if (!confirm('Отменить эту запись?')) return;
            
            const booking = bookings.find(b => b.id === id);
            if (booking) {
                booking.status = 'cancelled';
                localStorage.setItem('courseBookings', JSON.stringify(bookings));
                renderBookings();
                showNotification('🚫 Запись отменена', 'info');
            }
        }
        
        function restoreBooking(id) {
            const booking = bookings.find(b => b.id === id);
            if (booking) {
                booking.status = 'active';
                localStorage.setItem('courseBookings', JSON.stringify(bookings));
                renderBookings();
                showNotification('✅ Запись восстановлена', 'success');
            }
        }
        
        function deleteBooking(id) {
            if (!confirm('Удалить запись навсегда?')) return;
            
            bookings = bookings.filter(b => b.id !== id);
            localStorage.setItem('courseBookings', JSON.stringify(bookings));
            renderBookings();
            showNotification('🗑️ Запись удалена', 'info');
        }
        
        // ============ УВЕДОМЛЕНИЯ ============
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            clearTimeout(notification.timeout);
            notification.timeout = setTimeout(() => {
                notification.className = 'notification';
            }, 3000);
        }
    </script>
</body>
</html>
