<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на курсы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            background: transparent;
            color: #666;
        }

        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .required::after {
            content: " *";
            color: #f44336;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .time-btn {
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .time-btn:active {
            transform: scale(0.95);
        }

        .time-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .time-btn.full {
            background: #fff0f0;
            border-color: #ffcccc;
            color: #cc0000;
            opacity: 0.7;
        }

        .time-btn .available {
            font-size: 11px;
            opacity: 0.7;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .success-box {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .success-box.show {
            display: block;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .login-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        .booking-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .booking-item.cancelled {
            border-left-color: #f44336;
            opacity: 0.7;
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .booking-name {
            font-weight: 700;
            font-size: 16px;
        }

        .badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge-active {
            background: #d4edda;
            color: #155724;
        }

        .badge-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .booking-details {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .booking-actions {
            margin-top: 10px;
            display: flex;
            gap: 5px;
        }

        .btn-xs {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-xs:active {
            transform: scale(0.95);
        }

        .btn-cancel {
            background: #f44336;
            color: white;
        }

        .btn-restore {
            background: #4CAF50;
            color: white;
        }

        .btn-delete {
            background: #999;
            color: white;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease;
            max-width: 90%;
            text-align: center;
        }

        .notification.show {
            display: block;
        }

        .notification.success {
            background: #4CAF50;
        }

        .notification.error {
            background: #f44336;
        }

        .notification.info {
            background: #2196F3;
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📚 Запись на курсы</h1>

            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('user')">📝 Запись</button>
                <button class="tab" onclick="switchTab('admin')">🔐 Админ</button>
            </div>

            <!-- Форма для клиентов -->
            <div id="userTab">
                <form id="bookingForm" onsubmit="return false;">
                    <div class="form-group">
                        <label class="required">ФИО</label>
                        <input type="text" id="fullName" placeholder="Иванов Иван Иванович" required>
                    </div>

                    <div class="form-group">
                        <label class="required">Email</label>
                        <input type="email" id="email" placeholder="example@mail.ru" required>
                    </div>

                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" id="phone" placeholder="+7 (999) 123-45-67">
                    </div>

                    <div class="form-group">
                        <label class="required">Дата курса</label>
                        <input type="date" id="courseDate" required onchange="renderTimeSlots()">
                    </div>

                    <div class="form-group">
                        <label class="required">Время</label>
                        <div id="timeSlotsContainer" class="time-grid">
                            <div style="grid-column: 1/-1; color: #999; text-align: center; padding: 20px;">
                                👆 Сначала выберите дату
                            </div>
                        </div>
                        <input type="hidden" id="selectedTime" required>
                    </div>

                    <button type="submit" class="btn btn-primary" onclick="submitBooking()">
                        ✅ Записаться
                    </button>
                </form>

                <div id="successBox" class="success-box">
                    <div class="success-icon">✅</div>
                    <h2>Спасибо за запись!</h2>
                    <p style="margin: 15px 0; color: #666;">Вы успешно записаны на курс</p>
                    <button class="btn btn-primary" onclick="resetBookingForm()">
                        Записаться ещё раз
                    </button>
                </div>
            </div>

            <!-- Админ-панель -->
            <div id="adminTab" class="hidden">
                <div id="adminLoginBox" class="login-box">
                    <h3 style="margin-bottom: 15px;">🔐 Вход для администратора</h3>
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="loginInput" placeholder="admin">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="passwordInput" placeholder="••••••••">
                    </div>
                    <button class="btn btn-primary" onclick="adminLogin()">
                        Войти
                    </button>
                    <p style="text-align: center; margin-top: 12px; color: #999; font-size: 13px;">
                        Логин: admin / Пароль: admin123
                    </p>
                </div>

                <div id="adminPanelBox" class="hidden">
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value" id="totalBookings">0</div>
                            <div class="stat-label">Всего записей</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="todayBookings">0</div>
                            <div class="stat-label">За сегодня</div>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3>📋 Записи</h3>
                        <button class="btn-xs btn-delete" onclick="adminLogout()">Выйти</button>
                    </div>

                    <div class="form-group">
                        <input type="text" id="searchInput" placeholder="🔍 Поиск по имени, email..." oninput="renderAdminBookings()">
                    </div>

                    <div id="bookingsList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // ============ ЗАМЕНИТЕ ЭТУ СТРОКУ ============
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxC9lB9VIPnvprD8hPGseV9Ll_vQqYvZy6qayXrg3_-TbxcXoy8HRs5SQkn0vPNbJoF2w/exec';
        // ============================================

        const TIME_SLOTS = ['09:00', '10:00', '11:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];
        const MAX_PER_SLOT = 5;
        const ADMIN = { login: 'admin', password: 'admin123' };

        let bookings = [];

        // ============ ЗАГРУЗКА ============
        function loadBookings() {
            const saved = localStorage.getItem('allBookings');
            bookings = saved ? JSON.parse(saved) : [];
        }

        function saveBookings() {
            localStorage.setItem('allBookings', JSON.stringify(bookings));
        }

        // Инициализация
        loadBookings();
        setMinDate();
        renderTimeSlots();

        function setMinDate() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('courseDate').min = tomorrow.toISOString().split('T')[0];
        }

        // ============ ВКЛАДКИ ============
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'user') {
                tabs[0].classList.add('active');
                document.getElementById('userTab').classList.remove('hidden');
                document.getElementById('adminTab').classList.add('hidden');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('userTab').classList.add('hidden');
                document.getElementById('adminTab').classList.remove('hidden');
                document.getElementById('adminLoginBox').classList.remove('hidden');
                document.getElementById('adminPanelBox').classList.add('hidden');
            }
        }

        // ============ ВРЕМЕННЫЕ СЛОТЫ ============
        function renderTimeSlots() {
            const date = document.getElementById('courseDate').value;
            const container = document.getElementById('timeSlotsContainer');

            if (!date) {
                container.innerHTML = '<div style="grid-column: 1/-1; color: #999; text-align: center; padding: 20px;">👆 Сначала выберите дату</div>';
                return;
            }

            container.innerHTML = '';

            TIME_SLOTS.forEach(time => {
                const booked = bookings.filter(b => b.date === date && b.time === time && b.status === 'active').length;
                const available = MAX_PER_SLOT - booked;

                const btn = document.createElement('div');
                btn.className = 'time-btn';

                if (available <= 0) {
                    btn.classList.add('full');
                    btn.innerHTML = `${time}<br><span class="available">Нет мест</span>`;
                } else {
                    btn.innerHTML = `${time}<br><span class="available">${available} мест</span>`;
                }

                btn.onclick = function() {
                    if (available > 0) {
                        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        document.getElementById('selectedTime').value = time;
                    }
                };

                container.appendChild(btn);
            });
        }

        // ============ ОТПРАВКА ФОРМЫ ============
        async function submitBooking() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const date = document.getElementById('courseDate').value;
            const time = document.getElementById('selectedTime').value;

            // Проверки
            if (!fullName || !email || !date || !time) {
                showNotification('❌ Заполните все обязательные поля', 'error');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showNotification('❌ Введите корректный email', 'error');
                return;
            }

            // Проверка доступности
            const booked = bookings.filter(b => b.date === date && b.time === time && b.status === 'active').length;
            if (booked >= MAX_PER_SLOT) {
                showNotification('❌ На это время больше нет мест', 'error');
                return;
            }

            // Создаём запись
            const booking = {
                id: Date.now(),
                fullName,
                email,
                phone,
                date,
                time,
                status: 'active',
                createdAt: new Date().toISOString()
            };

            // Сохраняем локально
            bookings.push(booking);
            saveBookings();

            // Пробуем отправить в Google Таблицу
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(booking)
                });
                console.log('✅ Отправлено в Google Таблицу');
            } catch (error) {
                console.log('⚠️ Не удалось отправить в Google Таблицу:', error);
            }

            // Показываем успех
            document.getElementById('bookingForm').style.display = 'none';
            document.getElementById('successBox').classList.add('show');
            showNotification('✅ Вы успешно записаны!', 'success');
        }

        function resetBookingForm() {
            document.getElementById('bookingForm').style.display = 'block';
            document.getElementById('successBox').classList.remove('show');
            document.getElementById('bookingForm').reset();
            document.getElementById('selectedTime').value = '';
            renderTimeSlots();
        }

        // ============ АДМИН ============
        function adminLogin() {
            const login = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();

            if (login === ADMIN.login && password === ADMIN.password) {
                document.getElementById('adminLoginBox').classList.add('hidden');
                document.getElementById('adminPanelBox').classList.remove('hidden');
                renderAdminBookings();
                showNotification('✅ Вход выполнен', 'success');
            } else {
                showNotification('❌ Неверный логин или пароль', 'error');
            }
        }

        function adminLogout() {
            document.getElementById('adminLoginBox').classList.remove('hidden');
            document.getElementById('adminPanelBox').classList.add('hidden');
            document.getElementById('loginInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        function renderAdminBookings() {
            const searchText = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const container = document.getElementById('bookingsList');

            let filtered = [...bookings];

            if (searchText) {
                filtered = filtered.filter(b =>
                    b.fullName.toLowerCase().includes(searchText) ||
                    b.email.toLowerCase().includes(searchText) ||
                    (b.phone || '').includes(searchText) ||
                    b.date.includes(searchText)
                );
            }

            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            // Статистика
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('totalBookings').textContent = bookings.filter(b => b.status === 'active').length;
            document.getElementById('todayBookings').textContent = bookings.filter(b => b.date === today && b.status === 'active').length;

            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">Нет записей</p>';
                return;
            }

            container.innerHTML = filtered.map(b => `
                <div class="booking-item ${b.status === 'cancelled' ? 'cancelled' : ''}">
                    <div class="booking-header">
                        <span class="booking-name">${b.fullName}</span>
                        <span class="badge ${b.status === 'active' ? 'badge-active' : 'badge-cancelled'}">
                            ${b.status === 'active' ? 'Активна' : 'Отменена'}
                        </span>
                    </div>
                    <div class="booking-details">
                        📧 ${b.email}<br>
                        📞 ${b.phone || 'Не указан'}<br>
                        📅 ${new Date(b.date).toLocaleDateString('ru-RU')} в ${b.time}
                    </div>
                    <div class="booking-actions">
                        ${b.status === 'active' 
                            ? `<button class="btn-xs btn-cancel" onclick="cancelBooking(${b.id})">🚫 Отменить</button>`
                            : `<button class="btn-xs btn-restore" onclick="restoreBooking(${b.id})">✅ Восстановить</button>`
                        }
                        <button class="btn-xs btn-delete" onclick="deleteBooking(${b.id})">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        function cancelBooking(id) {
            if (!confirm('Отменить эту запись?')) return;
            const booking = bookings.find(b => b.id === id);
            if (booking) {
                booking.status = 'cancelled';
                saveBookings();
                renderAdminBookings();
                showNotification('🚫 Запись отменена', 'info');
            }
        }

        function restoreBooking(id) {
            const booking = bookings.find(b => b.id === id);
            if (booking) {
                booking.status = 'active';
                saveBookings();
                renderAdminBookings();
                showNotification('✅ Запись восстановлена', 'success');
            }
        }

        function deleteBooking(id) {
            if (!confirm('Удалить навсегда?')) return;
            bookings = bookings.filter(b => b.id !== id);
            saveBookings();
            renderAdminBookings();
            showNotification('🗑️ Запись удалена', 'info');
        }

        // ============ УВЕДОМЛЕНИЯ ============
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            clearTimeout(notification._timeout);
            notification._timeout = setTimeout(() => {
                notification.className = 'notification';
            }, 3000);
        }
    </script>
</body>
</html>
